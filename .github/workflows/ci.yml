name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  js:
    name: Typecheck & JS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (core + mcp + app)
        run: pnpm typecheck

      - name: Run JS tests
        run: pnpm test

  rust:
    name: Rust tests
    # macos runner: the product is macOS-only and this avoids installing
    # the Linux webkit2gtk toolchain just to compile tauri for tests.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
