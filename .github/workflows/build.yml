name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            arch: x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy config
        run: mkdir -p ~/.pengvi && cp .pengvi.config.json ~/.pengvi/config.json

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: env -u CI pnpm exec tauri build ${{ matrix.args }}

      - name: Rename updater artifacts with arch
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          if [ -f "$BUNDLE_DIR/Penguin.app.tar.gz" ]; then
            mv "$BUNDLE_DIR/Penguin.app.tar.gz" "$BUNDLE_DIR/Penguin_${{ matrix.arch }}.app.tar.gz"
          fi
          if [ -f "$BUNDLE_DIR/Penguin.app.tar.gz.sig" ]; then
            mv "$BUNDLE_DIR/Penguin.app.tar.gz.sig" "$BUNDLE_DIR/Penguin_${{ matrix.arch }}.app.tar.gz.sig"
          fi
          ls -la "$BUNDLE_DIR/"

      - name: Rename DMG to stable name
        run: |
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          DMG_FILE=$(ls -1 "$DMG_DIR"/*.dmg | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "No DMG found in $DMG_DIR"
            exit 1
          fi
          mv "$DMG_FILE" "$DMG_DIR/Penguin_${{ matrix.arch }}.dmg"
          ls -la "$DMG_DIR/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  release:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List all downloaded artifacts
        run: find . -type f

      - name: Generate latest.json
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="shiengng12345/penguin"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          AARCH64_TAR=$(find . -name '*aarch64*.app.tar.gz' ! -name '*.sig' | head -1)
          X86_TAR=$(find . -name '*x86_64*.app.tar.gz' ! -name '*.sig' | head -1)
          AARCH64_SIG_FILE=$(find . -name '*aarch64*.app.tar.gz.sig' | head -1)
          X86_SIG_FILE=$(find . -name '*x86_64*.app.tar.gz.sig' | head -1)

          echo "AARCH64_TAR: $AARCH64_TAR"
          echo "X86_TAR: $X86_TAR"
          echo "AARCH64_SIG: $AARCH64_SIG_FILE"
          echo "X86_SIG: $X86_SIG_FILE"

          AARCH64_SIG_CONTENT=$(cat "$AARCH64_SIG_FILE")
          X86_SIG_CONTENT=$(cat "$X86_SIG_FILE")
          AARCH64_NAME=$(basename "$AARCH64_TAR")
          X86_NAME=$(basename "$X86_TAR")
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 << PYEOF
          import json
          data = {
              "version": "$VERSION",
              "notes": "Penguin $TAG",
              "pub_date": "$NOW",
              "platforms": {
                  "darwin-aarch64": {
                      "signature": "$AARCH64_SIG_CONTENT",
                      "url": "$BASE_URL/$AARCH64_NAME"
                  },
                  "darwin-x86_64": {
                      "signature": "$X86_SIG_CONTENT",
                      "url": "$BASE_URL/$X86_NAME"
                  }
              }
          }
          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
          name: 'Penguin ${{ github.ref_name }}'
          generate_release_notes: true
          files: |
            **/*.dmg
            **/*.app.tar.gz
            **/*.app.tar.gz.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
