name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            arch: x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy config
        run: mkdir -p ~/.pengvi && cp .pengvi.config.json ~/.pengvi/config.json

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: env -u CI pnpm exec tauri build ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  release:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List all downloaded artifacts
        run: find . -type f

      - name: Generate latest.json
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="shiengng12345/penguin"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          echo "Looking for artifacts..."
          find . -type f -name "*.tar.gz*" -o -name "*.dmg"

          AARCH64_TAR=$(find . -name '*.app.tar.gz' ! -name '*.sig' | grep -i aarch64 | head -1 || true)
          X86_TAR=$(find . -name '*.app.tar.gz' ! -name '*.sig' | grep -i x86_64 | head -1 || true)

          # If no arch-specific names, the DMG names have arch but .app.tar.gz may not
          # Fall back to finding sig files by any .sig
          AARCH64_SIG_FILE=$(find . -name '*.tar.gz.sig' | grep -i aarch64 | head -1 || true)
          X86_SIG_FILE=$(find . -name '*.tar.gz.sig' | grep -i x86_64 | head -1 || true)

          # If tar.gz files don't have arch in name, they might just be Penguin.app.tar.gz
          # In that case, find them from the directory structure
          if [ -z "$AARCH64_TAR" ]; then
            AARCH64_TAR=$(find . -path '*aarch64*' -name '*.app.tar.gz' | head -1 || true)
          fi
          if [ -z "$X86_TAR" ]; then
            X86_TAR=$(find . -path '*x86_64*' -name '*.app.tar.gz' | head -1 || true)
          fi
          if [ -z "$AARCH64_SIG_FILE" ]; then
            AARCH64_SIG_FILE=$(find . -path '*aarch64*' -name '*.tar.gz.sig' | head -1 || true)
          fi
          if [ -z "$X86_SIG_FILE" ]; then
            X86_SIG_FILE=$(find . -path '*x86_64*' -name '*.tar.gz.sig' | head -1 || true)
          fi

          echo "AARCH64_TAR: $AARCH64_TAR"
          echo "X86_TAR: $X86_TAR"
          echo "AARCH64_SIG_FILE: $AARCH64_SIG_FILE"
          echo "X86_SIG_FILE: $X86_SIG_FILE"

          AARCH64_SIG_CONTENT=$(cat "$AARCH64_SIG_FILE")
          X86_SIG_CONTENT=$(cat "$X86_SIG_FILE")
          AARCH64_NAME=$(basename "$AARCH64_TAR")
          X86_NAME=$(basename "$X86_TAR")

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 << PYEOF
          import json
          data = {
              "version": "$VERSION",
              "notes": "Penguin $TAG",
              "pub_date": "$NOW",
              "platforms": {
                  "darwin-aarch64": {
                      "signature": "$AARCH64_SIG_CONTENT",
                      "url": "$BASE_URL/$AARCH64_NAME"
                  },
                  "darwin-x86_64": {
                      "signature": "$X86_SIG_CONTENT",
                      "url": "$BASE_URL/$X86_NAME"
                  }
              }
          }
          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: 'Penguin ${{ github.ref_name }}'
          body: 'Download the installer for your platform below.'
          files: |
            **/*.dmg
            **/*.app.tar.gz
            **/*.app.tar.gz.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
