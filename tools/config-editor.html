<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Penguin Config Editor</title>
  <style>
    :root {
      color-scheme: dark;
      --content-width: 1200px;
      --theme-bg: #0b0d12;
      --theme-panel: #10131a;
      --theme-panel-soft: #151925;
      --theme-panel-raised: #191e2b;
      --theme-accent: #8b5cf6;
      --theme-accent-soft: rgba(139, 92, 246, 0.14);
      --theme-text: #f4f5f8;
      --theme-muted: #9aa3b2;
      --theme-border: rgba(148, 163, 184, 0.18);
      --theme-border-strong: rgba(190, 201, 222, 0.28);
      --theme-danger: #fb7185;
      --theme-success: #86efac;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--theme-bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 24% -12%, rgba(139, 92, 246, 0.14), transparent 36%),
        linear-gradient(180deg, #0d1017 0%, var(--theme-bg) 58%, #090b10 100%);
      color: var(--theme-text);
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--theme-border);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--theme-text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    button:hover {
      border-color: var(--theme-border-strong);
      background: rgba(255, 255, 255, 0.06);
    }

    button:active {
      transform: translateY(1px);
    }

    button.primary {
      border-color: rgba(139, 92, 246, 0.72);
      background: var(--theme-accent);
      color: #ffffff;
    }

    button.primary:hover {
      background: #9f7aea;
    }

    button.danger {
      color: var(--theme-danger);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--theme-border);
      border-radius: 10px;
      background: #0c0f16;
      color: var(--theme-text);
      outline: none;
    }

    input {
      height: 42px;
      padding: 0 12px;
    }

    textarea {
      min-height: 130px;
      padding: 12px;
      resize: vertical;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      line-height: 1.55;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(154, 163, 178, 0.58);
    }

    input:focus,
    textarea:focus {
      border-color: rgba(139, 92, 246, 0.72);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.14);
    }

    .shell {
      width: min(var(--content-width), calc(100vw - 40px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
    }

    .brand h1,
    .form-title h2,
    p {
      margin: 0;
    }

    .brand h1 {
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--theme-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .toolbar button,
    .file-button {
      padding: 0 13px;
      white-space: nowrap;
    }

    .file-button {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      border: 1px solid var(--theme-border);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--theme-text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .file-button:hover {
      border-color: var(--theme-border-strong);
      background: rgba(255, 255, 255, 0.06);
    }

    .file-button input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .protocol-shell {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .protocol-sidebar,
    .config-form {
      border: 1px solid var(--theme-border);
      border-radius: 14px;
      background: rgba(16, 19, 26, 0.86);
      box-shadow: rgba(0, 0, 0, 0.28) 0 20px 60px;
    }

    .protocol-sidebar {
      position: sticky;
      top: 24px;
      padding: 10px;
    }

    .protocol-tabs {
      display: grid;
      gap: 6px;
    }

    .protocol-tabs button {
      min-height: 42px;
      padding: 0 12px;
      text-align: left;
    }

    .protocol-tabs button.active {
      border-color: rgba(139, 92, 246, 0.42);
      background: var(--theme-accent-soft);
      color: #ffffff;
    }

    .config-form {
      min-height: 560px;
      padding: 28px;
    }

    .form-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin-bottom: 7px;
      color: var(--theme-accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .form-title h2 {
      font-size: 26px;
      line-height: 1.2;
      font-weight: 700;
    }

    .form-body {
      display: grid;
      gap: 14px;
    }

    .environment-card,
    .sdk-card {
      border: 1px solid var(--theme-border);
      border-radius: 12px;
      background: var(--theme-panel-soft);
      padding: 18px;
    }

    .environment-card + .environment-card {
      margin-top: 12px;
    }

    .environment-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .environment-head strong {
      font-size: 14px;
      font-weight: 700;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--theme-muted);
      font-size: 12px;
      font-weight: 600;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .empty-state {
      border: 1px dashed var(--theme-border-strong);
      border-radius: 12px;
      padding: 22px;
      color: var(--theme-muted);
      font-size: 13px;
      text-align: center;
    }

    .status {
      margin-top: 18px;
      min-height: 40px;
      border: 1px solid var(--theme-border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      padding: 11px 12px;
      color: var(--theme-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .status.ok {
      border-color: rgba(134, 239, 172, 0.32);
      color: var(--theme-success);
    }

    .status.error {
      border-color: rgba(251, 113, 133, 0.38);
      color: var(--theme-danger);
    }

    .hidden,
    [hidden] {
      display: none !important;
    }

    .sr-only {
      position: fixed;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .dialog-shell {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(5, 7, 12, 0.72);
      backdrop-filter: blur(12px);
    }

    .dialog-shell.open {
      display: flex;
    }

    .dialog {
      width: min(720px, 100%);
      border: 1px solid var(--theme-border);
      border-radius: 14px;
      background: var(--theme-panel);
      box-shadow: rgba(0, 0, 0, 0.42) 0 24px 80px;
    }

    .dialog-head,
    .dialog-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--theme-border);
    }

    .dialog-body {
      padding: 16px;
    }

    .dialog-actions {
      justify-content: flex-end;
      border-top: 1px solid var(--theme-border);
      border-bottom: 0;
    }

    @media (max-width: 820px) {
      .topbar,
      .form-head {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .protocol-shell,
      .field-grid {
        grid-template-columns: 1fr;
      }

      .protocol-sidebar {
        position: static;
      }

      .protocol-tabs {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 24px, var(--content-width));
        padding: 24px 0;
      }

      .config-form {
        padding: 18px;
      }

      .protocol-tabs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-design="developer-config-editor">
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Penguin Config Editor</h1>
        <p class="subtitle">Edit local gRPC, gRPC-Web, and SDK config JSON without touching app storage.</p>
      </div>
      <div class="toolbar" aria-label="JSON actions">
        <label class="file-button">
          Upload JSON
          <input id="config-file" type="file" accept="application/json,.json">
        </label>
        <button id="import-json" type="button">Import JSON</button>
        <button id="download-json" class="primary" type="button">Export JSON</button>
        <button id="copy-json" type="button">Copy JSON</button>
      </div>
    </header>

    <section class="protocol-shell">
      <aside class="protocol-sidebar">
        <div id="protocol-tabs" class="protocol-tabs" aria-label="Protocol tabs">
          <button type="button" data-protocol="grpc">gRPC</button>
          <button type="button" data-protocol="grpc-web">gRPC-Web</button>
          <button type="button" data-protocol="sdk">SDK</button>
        </div>
      </aside>

      <section class="config-form">
        <div class="form-head">
          <div class="form-title">
            <p id="protocol-kicker" class="eyebrow">Protocol</p>
            <h2 id="editor-title">gRPC</h2>
            <p id="editor-description" class="subtitle">Configure environments for native gRPC requests.</p>
          </div>
          <button id="add-environment" class="primary" type="button">Add Environment</button>
        </div>

        <div id="environment-editor" class="form-body">
          <div id="environment-form-list"></div>
        </div>

        <div id="sdk-editor" class="form-body hidden">
          <div class="sdk-card">
            <div class="field-grid">
              <label>
                Package Name
                <input id="package-name" autocomplete="off" placeholder="@snsoft/example-sdk">
              </label>
              <label>
                Version
                <input id="package-version" autocomplete="off" placeholder="1.0.0">
              </label>
              <label class="field full">
                Registry
                <input id="package-registry" autocomplete="off" placeholder="https://registry.npmjs.org">
              </label>
              <label class="field full">
                Packages
                <textarea id="packages-input" spellcheck="false" placeholder="@snsoft/example-sdk@1.0.0"></textarea>
              </label>
            </div>
            <div class="form-actions">
              <button id="save-sdk" class="primary" type="button">Save</button>
            </div>
          </div>
        </div>

        <div id="status" class="status">Ready.</div>
      </section>
    </section>
  </main>

  <div id="import-dialog" class="dialog-shell" role="dialog" aria-modal="true" aria-labelledby="import-title">
    <div class="dialog">
      <div class="dialog-head">
        <strong id="import-title">Import JSON</strong>
        <button id="close-import" type="button">Close</button>
      </div>
      <div class="dialog-body">
        <label>
          Paste config JSON
          <textarea id="json-input" spellcheck="false" placeholder="Paste penguin.remote-config.json here"></textarea>
        </label>
      </div>
      <div class="dialog-actions">
        <button id="format-json" type="button">Use Current JSON</button>
        <button id="load-json" class="primary" type="button">Import JSON</button>
      </div>
    </div>
  </div>

  <textarea id="json-output" class="sr-only" spellcheck="false" readonly></textarea>

  <script>
    const PROTOCOLS = ["grpc", "grpc-web", "sdk"];
    const CORE_VARIABLES = ["URL", "TOKEN", "X_ENV_TAG"];
    const DEFAULT_REGISTRY = "https://registry.npmjs.org";
    const PROTOCOL_LABELS = {
      grpc: "gRPC",
      "grpc-web": "gRPC-Web",
      sdk: "SDK",
    };
    const PROTOCOL_DESCRIPTIONS = {
      grpc: "Configure environments for native gRPC requests.",
      "grpc-web": "Configure environments for browser gRPC-Web requests.",
      sdk: "Configure SDK packages for local install and sync.",
    };

    const state = {
      config: normalizeConfig({}),
      activeProtocol: "grpc",
    };

    const els = {
      file: document.getElementById("config-file"),
      importButton: document.getElementById("import-json"),
      importDialog: document.getElementById("import-dialog"),
      jsonInput: document.getElementById("json-input"),
      jsonOutput: document.getElementById("json-output"),
      protocolTabs: document.getElementById("protocol-tabs"),
      editorTitle: document.getElementById("editor-title"),
      editorDescription: document.getElementById("editor-description"),
      addEnvironment: document.getElementById("add-environment"),
      environmentEditor: document.getElementById("environment-editor"),
      environmentFormList: document.getElementById("environment-form-list"),
      sdkEditor: document.getElementById("sdk-editor"),
      packageName: document.getElementById("package-name"),
      packageVersion: document.getElementById("package-version"),
      packageRegistry: document.getElementById("package-registry"),
      packagesInput: document.getElementById("packages-input"),
      status: document.getElementById("status"),
    };

    function emptySection() {
      return { environments: [], packages: [] };
    }

    function variablesToObject(variables) {
      if (!variables) return {};
      if (Array.isArray(variables)) {
        return variables.reduce((acc, entry) => {
          if (entry && typeof entry.key === "string") {
            acc[entry.key] = String(entry.value ?? "");
          }
          return acc;
        }, {});
      }
      if (typeof variables === "object") {
        return Object.fromEntries(
          Object.entries(variables).map(([key, value]) => [key, String(value ?? "")])
        );
      }
      return {};
    }

    function normalizeEnvironment(env) {
      const variables = variablesToObject(env && env.variables);
      return {
        name: String((env && env.name) || "").trim(),
        color: String((env && env.color) || "blue").trim() || "blue",
        variables: {
          URL: String(variables.URL || ""),
          TOKEN: String(variables.TOKEN || ""),
          X_ENV_TAG: String(variables.X_ENV_TAG || ""),
        },
      };
    }

    function normalizeConfig(input) {
      const source = input && typeof input === "object" ? input : {};
      const next = {};
      for (const protocol of PROTOCOLS) {
        const section = source[protocol] && typeof source[protocol] === "object"
          ? source[protocol]
          : emptySection();
        next[protocol] = {
          environments: Array.isArray(section.environments)
            ? section.environments.map(normalizeEnvironment)
            : [],
          packages: Array.isArray(section.packages)
            ? section.packages.map((item) => String(item)).filter(Boolean)
            : [],
        };
        if (protocol === "sdk") {
          next[protocol].registry = String(section.registry || DEFAULT_REGISTRY);
        }
      }
      return next;
    }

    function activeSection() {
      return state.config[state.activeProtocol];
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setStatus(message, type = "") {
      els.status.textContent = message;
      els.status.className = `status ${type}`.trim();
    }

    function parsePackageSpec(spec) {
      const trimmed = String(spec || "").trim();
      if (!trimmed) return { name: "", version: "" };
      const at = trimmed.startsWith("@") ? trimmed.lastIndexOf("@") : trimmed.indexOf("@");
      if (at > 0) {
        return {
          name: trimmed.slice(0, at),
          version: trimmed.slice(at + 1),
        };
      }
      return { name: trimmed, version: "" };
    }

    function buildPackageSpec(name, version) {
      const cleanName = name.trim();
      const cleanVersion = version.trim();
      return cleanName && cleanVersion ? `${cleanName}@${cleanVersion}` : cleanName;
    }

    function validateConfig(config = state.config) {
      const messages = [];
      for (const protocol of ["grpc", "grpc-web"]) {
        const seen = new Set();
        config[protocol].environments.forEach((env, index) => {
          const name = env.name.trim();
          if (!name) messages.push(`${protocol}: environment ${index + 1} name is required`);
          const key = name.toLowerCase();
          if (key && seen.has(key)) messages.push(`${protocol}: duplicate environment "${name}"`);
          seen.add(key);
        });
      }
      return { ok: messages.length === 0, messages };
    }

    function renderProtocolTabs() {
      for (const button of els.protocolTabs.querySelectorAll("button[data-protocol]")) {
        button.classList.toggle("active", button.dataset.protocol === state.activeProtocol);
      }
    }

    function renderEnvironmentForms() {
      const section = activeSection();
      if (!section.environments.length) {
        els.environmentFormList.innerHTML = renderEnvironmentCard({
          name: "",
          variables: { URL: "", TOKEN: "", X_ENV_TAG: "" },
        }, "new", false);
        return;
      }

      els.environmentFormList.innerHTML = section.environments
        .map((env, index) => renderEnvironmentCard(env, index, true))
        .join("");
    }

    function renderEnvironmentCard(env, index, canDelete) {
      const variables = env.variables || {};
      const deleteButton = canDelete
        ? `<button class="danger" type="button" data-action="delete" data-index="${index}">Delete</button>`
        : "";
      return `
        <form class="environment-card" data-index="${index}">
          <div class="environment-head">
            <strong>Environment ${index === "new" ? "" : Number(index) + 1}</strong>
            ${deleteButton}
          </div>
          <div class="field-grid">
            <label>
              Environment Name
              <input name="name" autocomplete="off" value="${escapeHtml(env.name)}" placeholder="QAT">
            </label>
            <label>
              URL
              <input name="url" autocomplete="off" value="${escapeHtml(variables.URL)}" placeholder="https://fpms-nt-swim.platform88.me">
            </label>
            <label>
              Token
              <input name="token" autocomplete="off" value="${escapeHtml(variables.TOKEN)}" placeholder="Bearer ...">
            </label>
            <label>
              X_ENV_TAG
              <input name="envTag" autocomplete="off" value="${escapeHtml(variables.X_ENV_TAG)}" placeholder="QAT">
            </label>
          </div>
          <div class="form-actions">
            <button class="primary" type="submit">Save</button>
          </div>
        </form>
      `;
    }

    function renderSdkForm() {
      const section = state.config.sdk;
      const firstPackage = parsePackageSpec(section.packages[0]);
      els.packageName.value = firstPackage.name;
      els.packageVersion.value = firstPackage.version;
      els.packageRegistry.value = section.registry || DEFAULT_REGISTRY;
      els.packagesInput.value = section.packages.join("\n");
    }

    function renderEditor() {
      const isSdk = state.activeProtocol === "sdk";
      const label = PROTOCOL_LABELS[state.activeProtocol] || state.activeProtocol;
      els.editorTitle.textContent = label;
      els.editorDescription.textContent = PROTOCOL_DESCRIPTIONS[state.activeProtocol] || "";
      els.addEnvironment.hidden = isSdk;
      els.environmentEditor.classList.toggle("hidden", isSdk);
      els.sdkEditor.classList.toggle("hidden", !isSdk);
      renderProtocolTabs();
      if (isSdk) {
        renderSdkForm();
      } else {
        renderEnvironmentForms();
      }
      renderJsonOutput();
      renderValidation();
    }

    function addEnvironment() {
      activeSection().environments.push({
        name: "",
        color: "blue",
        variables: { URL: "", TOKEN: "", X_ENV_TAG: "" },
      });
      renderEditor();
      setStatus("Added a new environment row. Fill it in and save.", "ok");
    }

    function saveEnvironment(event) {
      event.preventDefault();
      const form = event.target.closest("form[data-index]");
      if (!form) return;
      const index = form.dataset.index;
      const formData = new FormData(form);
      const nextEnvironment = {
        name: String(formData.get("name") || "").trim(),
        color: "blue",
        variables: {
          URL: String(formData.get("url") || "").trim(),
          TOKEN: String(formData.get("token") || "").trim(),
          X_ENV_TAG: String(formData.get("envTag") || "").trim(),
        },
      };
      if (index === "new") {
        activeSection().environments.push(nextEnvironment);
      } else {
        activeSection().environments[Number(index)] = nextEnvironment;
      }
      renderEditor();
      setStatus("Environment saved.", "ok");
    }

    function deleteEnvironment(index) {
      const env = activeSection().environments[index];
      if (!env) return;
      if (env.name && !window.confirm(`Delete ${env.name}?`)) return;
      activeSection().environments.splice(index, 1);
      renderEditor();
      setStatus("Environment deleted.", "ok");
    }

    function saveSdkConfig() {
      const section = state.config.sdk;
      const packageLines = els.packagesInput.value
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);
      const spec = buildPackageSpec(els.packageName.value, els.packageVersion.value);
      if (spec) {
        packageLines[0] = spec;
      }
      section.packages = packageLines;
      section.registry = els.packageRegistry.value.trim() || DEFAULT_REGISTRY;
      renderEditor();
      setStatus("SDK package config saved.", "ok");
    }

    function renderValidation() {
      const result = validateConfig();
      if (result.ok) {
        setStatus("Config is valid.", "ok");
      } else {
        setStatus(result.messages.join(" | "), "error");
      }
    }

    function renderJsonOutput() {
      els.jsonOutput.value = JSON.stringify(state.config, null, 2);
    }

    function parseJsonFromText(text) {
      if (!text.trim()) throw new Error("JSON input is empty");
      return JSON.parse(text);
    }

    function loadConfigObject(value, message) {
      state.config = normalizeConfig(value);
      renderEditor();
      setStatus(message, "ok");
    }

    function openImportDialog() {
      els.jsonInput.value = JSON.stringify(state.config, null, 2);
      els.importDialog.classList.add("open");
      setTimeout(() => els.jsonInput.focus(), 0);
    }

    function closeImportDialog() {
      els.importDialog.classList.remove("open");
    }

    function downloadConfig() {
      const result = validateConfig();
      if (!result.ok) {
        setStatus(result.messages.join(" | "), "error");
        return;
      }
      renderJsonOutput();
      const blob = new Blob([els.jsonOutput.value + "\n"], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "penguin.remote-config.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setStatus("Exported penguin.remote-config.json.", "ok");
    }

    async function copyConfigJson() {
      renderJsonOutput();
      try {
        await navigator.clipboard.writeText(els.jsonOutput.value);
        setStatus("Copied JSON to clipboard.", "ok");
      } catch {
        els.jsonOutput.classList.remove("sr-only");
        els.jsonOutput.focus();
        els.jsonOutput.select();
        document.execCommand("copy");
        els.jsonOutput.classList.add("sr-only");
        setStatus("Copied JSON.", "ok");
      }
    }

    els.file.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        els.jsonInput.value = text;
        loadConfigObject(JSON.parse(text), `Loaded ${file.name}.`);
      } catch (err) {
        setStatus(`Failed to load file: ${err.message || err}`, "error");
      } finally {
        event.target.value = "";
      }
    });

    els.importButton.addEventListener("click", openImportDialog);
    document.getElementById("close-import").addEventListener("click", closeImportDialog);
    document.getElementById("format-json").addEventListener("click", () => {
      els.jsonInput.value = JSON.stringify(state.config, null, 2);
    });
    document.getElementById("load-json").addEventListener("click", () => {
      try {
        loadConfigObject(parseJsonFromText(els.jsonInput.value), "Imported pasted JSON.");
        closeImportDialog();
      } catch (err) {
        setStatus(`Invalid JSON: ${err.message || err}`, "error");
      }
    });

    document.getElementById("download-json").addEventListener("click", downloadConfig);
    document.getElementById("copy-json").addEventListener("click", copyConfigJson);
    els.addEnvironment.addEventListener("click", addEnvironment);
    document.getElementById("save-sdk").addEventListener("click", saveSdkConfig);

    els.protocolTabs.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-protocol]");
      if (!button) return;
      state.activeProtocol = button.dataset.protocol;
      renderEditor();
    });

    els.environmentFormList.addEventListener("submit", saveEnvironment);
    els.environmentFormList.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action='delete']");
      if (!button) return;
      deleteEnvironment(Number(button.dataset.index));
    });

    els.importDialog.addEventListener("click", (event) => {
      if (event.target === els.importDialog) closeImportDialog();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && els.importDialog.classList.contains("open")) {
        closeImportDialog();
      }
    });

    renderEditor();
  </script>
</body>
</html>
